services:
  - type: web
    name: stayvacation
    runtime: php
    plan: free
    buildCommand: bash build.sh
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: StayVacation
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false          # fill in after first deploy with your render URL

      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

      # Database — connected to the MySQL service below
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromService:
          name: stayvacation-db
          type: pserv
          property: host
      - key: DB_PORT
        fromService:
          name: stayvacation-db
          type: pserv
          property: port
      - key: DB_DATABASE
        fromService:
          name: stayvacation-db
          type: pserv
          property: database
      - key: DB_USERNAME
        fromService:
          name: stayvacation-db
          type: pserv
          property: user
      - key: DB_PASSWORD
        fromService:
          name: stayvacation-db
          type: pserv
          property: password

      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: local

      # Mail — copy your Gmail SMTP values here
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_USERNAME
        sync: false          # set in Render dashboard
      - key: MAIL_PASSWORD
        sync: false          # set in Render dashboard (Gmail app password)
      - key: MAIL_FROM_ADDRESS
        sync: false          # set in Render dashboard
      - key: MAIL_FROM_NAME
        value: StayVacation

databases:
  - name: stayvacation-db
    plan: free
    databaseName: stayvacation
    user: stayvacation
