services:
  - type: web
    name: stayvacation
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: StayVacation
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false        # set after first deploy with your .onrender.com URL

      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error

      # PostgreSQL — use fromDatabase (not fromService) for Render Postgres
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: stayvacation-db
          property: connectionString

      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: local

      # Mail — set in the Render dashboard after deploy
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: StayVacation

databases:
  - name: stayvacation-db
    plan: free
    databaseName: stayvacation
    user: stayvacation
